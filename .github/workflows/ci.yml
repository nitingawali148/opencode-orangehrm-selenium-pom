name: Selenium Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - run: pip install -r requirements.txt
      
      - run: pytest tests/test_login.py -v --html=reports/report.html
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: reports/
